<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Thank You | LoopTech Software Solutions</title>

  <meta
    name="description"
    content="Thank you for contacting LoopTech Software Solutions. Our team will contact you shortly."
  >

  <link rel="icon" href="logo.png">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: linear-gradient(135deg, #081c3a, #00c6ff);
      color: #222;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .thank-you-box {
      width: 100%;
      max-width: 550px;
      padding: 50px 40px;
      border-radius: 25px;
      background: #fff;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    }

    .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #25d366;
      color: #fff;
      font-size: 48px;
      font-weight: 700;
    }

    h1 {
      margin-bottom: 15px;
      color: #081c3a;
      font-size: 42px;
    }

    .message {
      margin-bottom: 25px;
      color: #555;
      font-size: 18px;
      line-height: 1.7;
    }

    .info {
      margin-bottom: 25px;
      padding: 18px;
      border-radius: 12px;
      background: #f4f8ff;
      color: #081c3a;
      font-weight: 600;
      line-height: 1.9;
    }

    .info a {
      color: #081c3a;
      text-decoration: none;
    }

    .info a:hover {
      text-decoration: underline;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-block;
      min-width: 220px;
      padding: 14px 30px;
      border-radius: 40px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .home-btn {
      background: #ff6b00;
    }

    .whatsapp-btn {
      background: #25d366;
    }

    .footer {
      margin-top: 25px;
      color: #777;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .thank-you-box {
        padding: 40px 25px;
      }

      h1 {
        font-size: 34px;
      }

      .message {
        font-size: 16px;
      }

      .btn {
        width: 100%;
        min-width: 0;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="thank-you-box">
    <div class="icon" aria-hidden="true">✓</div>

    <h1>Thank You!</h1>

    <p class="message">
      Your demo request has been submitted successfully.
      <br>
      Our LoopTech team will contact you shortly.
    </p>

    <div class="info">
      📞
      <a href="tel:+971567275589">
        +971 56 727 5589
      </a>
      <br>

      📧
      <a href="mailto:jcjlooptech@gmail.com">
        jcjlooptech@gmail.com
      </a>
      <br>

      📍 Abu Dhabi, UAE
    </div>

    <div class="actions">
      <a
        href="/"
        class="btn home-btn"
      >
        Back To Home
      </a>

      <a
        href="https://wa.me/971567275589"
        target="_blank"
        rel="noopener noreferrer"
        class="btn whatsapp-btn"
        id="whatsappBtn"
      >
        Chat on WhatsApp
      </a>
    </div>

    <div class="footer">
      © 2026 LoopTech Software Solutions.
      All Rights Reserved.
    </div>
  </main>

  <script>
    "use strict";

    const whatsappBtn =
      document.getElementById("whatsappBtn");

    let demoData = {};

    try {
      demoData = JSON.parse(
        localStorage.getItem("demoData") || "{}"
      );
    } catch (error) {
      console.error(
        "Unable to read demo data:",
        error
      );
    }

    if (whatsappBtn && demoData.name) {
      const message = [
        "NEW DEMO REQUEST",
        "",
        `Name: ${demoData.name || ""}`,
        `Phone: ${demoData.phone || ""}`,
        `Email: ${demoData.email || ""}`,
        `Business: ${demoData.business || ""}`,
        `Industry: ${demoData.businessType || ""}`,
        `Service: ${demoData.service || ""}`,
        `Message: ${demoData.message || "No message"}`
      ].join("\n");

      whatsappBtn.href =
        "https://wa.me/971567275589?text=" +
        encodeURIComponent(message);
    }
  </script>
</body>
</html>
